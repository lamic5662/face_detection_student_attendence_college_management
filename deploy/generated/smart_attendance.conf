upstream smartattend_backend {
    least_conn;
    server 127.0.0.1:5050 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:5051 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name suraj57.com.np *.suraj57.com.np;

    client_max_body_size 20m;

    location / {
        proxy_pass http://smartattend_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /static/ {
        alias /opt/smart_attendance/current/static/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
