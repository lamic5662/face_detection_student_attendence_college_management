upstream smartattend_local_backend {
    least_conn;
    server 127.0.0.1:5050 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:5051 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 8081;
    listen [::]:8081;
    server_name localhost 127.0.0.1 192.168.1.81 _;

    client_max_body_size 20m;

    location / {
        proxy_pass http://smartattend_local_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /static/ {
        proxy_pass http://smartattend_local_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
