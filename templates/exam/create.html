{% extends "base.html" %}
{% block title %}Create Exam{% endblock %}
{% block page_title %}<i class="bi bi-plus-circle-fill me-2"></i>Create Exam{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm border-0">
      <div class="card-body px-4 py-4">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
              <input type="text" name="title" class="form-control" required placeholder="Mid-Term Examination">
            </div>
            <div class="col-md-7">
              <label class="form-label fw-semibold">Subject <span class="text-danger">*</span></label>
              <select name="subject_id" class="form-select" required>
                <option value="">Select Subject</option>
                {% for sub in subjects %}
                <option value="{{ sub.id }}">{{ sub.name }} ({{ sub.code }})</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-5">
              <label class="form-label fw-semibold">Exam Type</label>
              <select name="exam_type" class="form-select">
                <option value="quiz">Quiz</option>
                <option value="mid_term" selected>Mid Term</option>
                <option value="final">Final Exam</option>
                <option value="practical">Practical</option>
                <option value="assignment">Assignment</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Date <span class="text-danger">*</span></label>
              <input type="date" name="exam_date" class="form-control" required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Start Time</label>
              <input type="time" name="start_time" class="form-control">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Duration (mins)</label>
              <input type="number" name="duration_mins" class="form-control" placeholder="180">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Total Marks</label>
              <input type="number" name="total_marks" class="form-control" value="100" min="1" required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Pass Marks</label>
              <input type="number" name="pass_marks" class="form-control" placeholder="33">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Room / Hall</label>
              <input type="text" name="room" class="form-control" placeholder="Exam Hall A">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Instructions (optional)</label>
              <textarea name="instructions" class="form-control" rows="3"
                        placeholder="No electronic devices allowed…"></textarea>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <a href="{{ url_for('exam.teacher_exams') }}" class="btn btn-light">Cancel</a>
            <button type="submit" class="btn btn-primary fw-semibold px-4">
              <i class="bi bi-save me-2"></i>Create &amp; Enter Marks
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
