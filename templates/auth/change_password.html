{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block page_title %}<i class="bi bi-key-fill me-2"></i>Change Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Current Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill text-muted"></i></span>
              <input type="password" name="current_password" class="form-control" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">New Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill text-primary"></i></span>
              <input type="password" name="new_password" class="form-control"
                     minlength="8" required placeholder="Min. 8 chars, upper, lower, digit, symbol">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm New Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill text-success"></i></span>
              <input type="password" name="confirm_password" class="form-control" required>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-grow-1 fw-semibold">
              <i class="bi bi-check-circle-fill me-2"></i>Update Password
            </button>
            <a href="{{ url_for(current_user.role + '.dashboard') }}" class="btn btn-light">
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
